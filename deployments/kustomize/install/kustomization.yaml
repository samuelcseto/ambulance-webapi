apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
    - deployment.yaml
    - service.yaml

configMapGenerator:
    - name: scs-ambulance-webapi-mongodb-init
      files:
          - params/init-db.js
    - name: scs-ambulance-webapi-config
      literals:
          - database=scs-ambulance
          - collection=ambulance

patches:
    - path: patches/webapi.deployment.yaml
      target:
          group: apps
          version: v1
          kind: Deployment
          name: scs-ambulance-webapi
